<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>UGV Dashboard</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      padding: 20px;
    }

    .dashboard-box{
      width: 100%;
      max-width: 850px;
      background: white;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .dashboard-box h1{
      font-size: 45px;
      color: #1f4037;
      margin-bottom: 5px;
    }

    .dashboard-box h3{
      color: gray;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .dashboard-box h2{
      color: #111827;
      margin-bottom: 35px;
      font-size: 28px;
    }

    .card-container{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card{
      background: #f9fafb;
      padding: 35px 25px;
      border-radius: 15px;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .card:hover{
      transform: translateY(-5px);
    }

    .card h3{
      color: #1f4037;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .card p{
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 15px;
    }

    .card a{
      text-decoration: none;
    }

    .card button{
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #1f4037;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card button:hover{
      background: #145a32;
    }

    @media(max-width: 600px){

      .dashboard-box{
        padding: 30px 20px;
      }

      .dashboard-box h1{
        font-size: 35px;
      }

      .dashboard-box h2{
        font-size: 22px;
      }

    }

  </style>

</head>

<body>

  <div class="dashboard-box">

    <h1>UGV</h1>

    <h3>University of Global Village</h3>

    <h2>Exam Management Dashboard</h2>

    <div class="card-container">

      <!-- ADD EXAM -->
      <div class="card">

        <h3>Add Exam</h3>

        <p>
          Create and publish new exam schedules for students.
        </p>

        <!-- DJANGO LINK -->
        <a href="/add-exam/">

          <button>
            Add Exam
          </button>

        </a>

      </div>


      <!-- VIEW EXAM -->
      <div class="card">

        <h3>View Exams</h3>

        <p>
          View all published exam schedules and exam information.
        </p>

        <!-- FIXED LINK -->
        <a href="/admin-exam/">

          <button>
            View Exams
          </button>

        </a>

      </div>

    </div>

  </div>

</body>
</html>
